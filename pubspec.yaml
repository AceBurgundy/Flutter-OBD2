name: obd2
description: A production-ready SAE J1979 OBD-II SDK for Flutter with BLE support for ELM327-compatible adapters. Provides real-time telemetry, DTC parsing, and type-safe PID handling.
version: 0.9.0
repository: https://github.com/AceBurgundy/Flutter-OBD2
homepage: https://github.com/AceBurgundy/Flutter-OBD2
issue_tracker: https://github.com/AceBurgundy/Flutter-OBD2/issues

# License identifier (must match LICENSE file in repository).
license: MPL-2.0

# Improve discoverability
topics:
  - obd2
  - automotive
  - telemetry
  - bluetooth
  - elm327

# Explicit platform declaration
platforms:
  android:

# Some sample screenshots to show off the package's capabilities.
screenshots:
  - description: 'A live view of the package being used'
    path: screenshots/dashboard.jpg

# Dart SDK constraints.
# Compatibility with all Dart 3 versions.
environment:
  sdk: ">=3.0.0 <4.0.0"

# Package dependencies.
dependencies:

  # This package depends on Flutter plugins (BLE).
  flutter:
    sdk: flutter

  # Bluetooth Low Energy library used for ELM327 communication.
  flutter_blue_plus: ^2.1.0

  # Used for dynamic PID formula evaluation.
  math_expressions: ^3.1.0

# Development-only dependencies.
dev_dependencies:

  # Recommended lint rules for modern Dart/Flutter packages.
  lints: ^6.0.0

  # Unit testing framework.
  test: ^1.25.6

